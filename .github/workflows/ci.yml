name: Grain CI Workflow
on: [push, pull_request]

jobs:
  build:
    name: Build and test
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]

    steps:
      - name: Use Node.js
        uses: actions/setup-node@v1
        with:
          node-version: '14.x'

      - uses: actions/checkout@v2

      - name: Set up runtime and CLI
        run: |
          yarn
          yarn setup

      - name: Prepare cygwin
        if: matrix.os == 'windows-latest'
        env:
          CYGWIN_ROOT: 'node_modules/esy/node_modules/esy-bash/.cygwin'
        run: |
          ${{ env.CYGWIN_ROOT }}/setup-x86_64.exe --quiet-mode --root ${{ env.CYGWIN_ROOT }} --site http://cygwin.mirror.constant.com --packages mingw64-x86_64-binutils

      - name: esy install
        run: |
          yarn workspace @grain/compiler run esy install

      - name: Restore esy cache
        id: restore-cache
        uses: actions/cache@v1
        with:
          path: compiler/_export
          key:  ${{ runner.os }}-esy-${{ hashFiles('compiler/esy.lock/index.json') }}
          restore-keys: |
            ${{ runner.os }}-esy-

      # Only import the dependency cache if we had a cache hit
      - name: Import esy cache
        if: steps.restore-cache.outputs.cache-hit == 'true'
        run: |
          yarn workspace @grain/compiler run esy import-dependencies _export
          npx -p del-cli del compiler/_export

      - name: Build compiler
        run: |
          yarn compiler:build

      # Re-export dependencies if anything has changed or if it is the first time
      - name: Build esy cache
        if: steps.restore-cache.outputs.cache-hit != 'true'
        run: |
          yarn workspace @grain/compiler run esy export-dependencies

      - name: Run tests
        run: |
          yarn compiler:test
