name: Grain CI Workflow
on: [push, pull_request]

jobs:
  build:
    name: Build and test
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v2.1.0
        with:
          node-version: '14'
          check-latest: true

      # This configures yarn to use node/npm prefix in our path
      # It also adds `shx` globally for cross-platform shell commands
      - name: Setup environment
        run: |
          yarn config set prefix $(npm config get prefix)
          yarn global add shx

      - name: Checkout project
        uses: actions/checkout@v2

      - name: Set up runtime and CLI
        run: |
          yarn
          yarn setup

      - name: Esy setup
        run: |
          yarn compiler setup

      - name: Build compiler
        run: |
          cd compiler
          yarn esy command-exec cmake
