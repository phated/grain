name: Grain CI Workflow
on: [push, pull_request]

jobs:
  build:
    name: Build and test
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]

    steps:
      - name: Where cmake & python
        shell: bash
        run: |
          which cmake
          which python

