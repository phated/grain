name: Grain CI Workflow
on: [push, pull_request]

jobs:
  build:
    name: Build and test
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]

    steps:
      - name: Checkout project
        uses: actions/checkout@v2

      - name: Build compiler
        shell: bash
        run: |
          bash -ex cmake-config.sh
